<div class="categorie-list-container">
  <div class="list-header">
    <h2>Catégories</h2>
    <a routerLink="/catalogue/categories/new" mat-raised-button color="primary">
      <mat-icon>add</mat-icon>
      Nouvelle Catégorie
    </a>
  </div>

  <div class="search-bar">
    <mat-form-field class="search-field">
      <mat-label>Rechercher</mat-label>
      <input matInput [(ngModel)]="searchTerm" (keyup.enter)="onSearch()" />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <button mat-button (click)="onSearch()">Rechercher</button>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="categories" class="mat-elevation-z8">
      <!-- Libelle Column -->
      <ng-container matColumnDef="libelle">
        <th mat-header-cell *matHeaderCellDef>Libellé</th>
        <td mat-cell *matCellDef="let element">{{ element.libelle }}</td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="estActif">
        <th mat-header-cell *matHeaderCellDef>Statut</th>
        <td mat-cell *matCellDef="let element">
          <span class="status" [ngClass]="element.estActif ? 'active' : 'inactive'">
            {{ getStatusLabel(element.estActif) }}
          </span>
        </td>
      </ng-container>

      <!-- Date Creation Column -->
      <ng-container matColumnDef="dateCreation">
        <th mat-header-cell *matHeaderCellDef>Date Création</th>
        <td mat-cell *matCellDef="let element">{{ element.dateCreation | date: 'short' }}</td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button [routerLink]="['/catalogue/categories', element.id]" color="primary" title="Voir">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button [routerLink]="['/catalogue/categories', element.id, 'edit']" color="primary" title="Modifier">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="onDelete(element)" color="warn" title="Supprimer">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <mat-paginator
    [length]="totalItems"
    [pageSize]="pageSize"
    [pageSizeOptions]="[10, 20, 50, 100]"
    (page)="onPageChange($event)">
  </mat-paginator>
</div>
