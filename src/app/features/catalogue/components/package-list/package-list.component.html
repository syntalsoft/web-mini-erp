<div class="package-list-container">
  <div class="list-header">
    <h2>Packages</h2>
    <a routerLink="/catalogue/packages/new" mat-raised-button color="primary">
      <mat-icon>add</mat-icon>
      Nouveau Package
    </a>
  </div>

  <div class="search-bar">
    <mat-form-field class="search-field">
      <mat-label>Rechercher</mat-label>
      <input matInput [(ngModel)]="searchTerm" (keyup.enter)="onSearch()" />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <button mat-button (click)="onSearch()">Rechercher</button>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="packages" class="mat-elevation-z8">
      <!-- Reference Column -->
      <ng-container matColumnDef="reference">
        <th mat-header-cell *matHeaderCellDef>Référence</th>
        <td mat-cell *matCellDef="let element">{{ element.reference }}</td>
      </ng-container>

      <!-- Designation Column -->
      <ng-container matColumnDef="designation">
        <th mat-header-cell *matHeaderCellDef>Désignation</th>
        <td mat-cell *matCellDef="let element">{{ element.designation }}</td>
      </ng-container>

      <!-- Price Column -->
      <ng-container matColumnDef="prixVenteHT">
        <th mat-header-cell *matHeaderCellDef>Prix Vente HT</th>
        <td mat-cell *matCellDef="let element">{{ formatPrice(element.prixVenteHT) }}</td>
      </ng-container>

      <!-- Compositions Column -->
      <ng-container matColumnDef="compositions">
        <th mat-header-cell *matHeaderCellDef>Compositions</th>
        <td mat-cell *matCellDef="let element">
          <mat-icon matTooltip="Nombre d'articles dans le package">inventory_2</mat-icon>
          {{ getCompositionCount(element) }} article(s)
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button [routerLink]="['/catalogue/packages', element.id]" color="primary" title="Voir">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button [routerLink]="['/catalogue/packages', element.id, 'edit']" color="primary" title="Modifier">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="onDelete(element)" color="warn" title="Supprimer">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <mat-paginator
    [length]="totalItems"
    [pageSize]="pageSize"
    [pageSizeOptions]="[10, 20, 50, 100]"
    (page)="onPageChange($event)">
  </mat-paginator>
</div>
